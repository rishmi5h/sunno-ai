<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sunno — Someone to listen</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Caveat:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Landing screen -->
    <div id="landing" class="screen active">
        <div class="landing-content">
            <h1 class="logo">सुनो</h1>
            <p class="tagline">Someone to listen. No advice. No judgment. Just here.</p>
            <button id="start-btn" class="start-button">Start talking</button>
        </div>
        <footer class="landing-footer">
            <p>If you're in crisis: iCall <a href="tel:9152987821">9152987821</a> | Vandrevala Foundation <a href="tel:18602662345">1860-2662-345</a></p>
        </footer>
    </div>

    <!-- Session screen -->
    <div id="session" class="screen">
        <div class="session-container">
            <!-- The orb -->
            <div id="orb-container">
                <canvas id="orb" width="300" height="300"></canvas>
            </div>

            <!-- Status text -->
            <p id="status" class="status-text">Tap to talk</p>

            <!-- Subtle transcript (for accessibility) -->
            <div id="transcript-area" class="transcript-area" aria-live="polite"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
